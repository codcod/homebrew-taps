name: Update SDLC Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.2)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch SHA256 from GitLab
        id: calculate-sha
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Ensure version starts with 'v' for the tag
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v${VERSION}"
          fi

          BASE_URL="https://gitlab.com/api/v4/projects/82736572/packages/generic/sdlc/${VERSION}"
          TARBALL="sdlc-${VERSION}-darwin-universal.tar.gz"
          URL="${BASE_URL}/${TARBALL}"
          SHA256_URL="${URL}.sha256"

          echo "Fetching SHA256 from ${SHA256_URL}"

          # Download SHA256 file with error checking
          if ! curl -L "${SHA256_URL}" \
               --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
               -o sdlc.sha256 -f; then
            echo "❌ Failed to fetch SHA256 for ${VERSION}"
            echo "❌ URL: ${SHA256_URL}"
            echo "❌ This release may not exist. Please check:"
            echo "   https://gitlab.com/Nicos.Karagieorgopulus/ai-sdlc/-/releases"
            exit 1
          fi

          # Parse SHA256 (handles both 'hash' and 'hash  filename' formats)
          SHA256=$(awk '{print $1}' sdlc.sha256)

          if [ -z "$SHA256" ]; then
            echo "❌ Failed to parse SHA256 from file"
            cat sdlc.sha256
            exit 1
          fi

          echo "✅ SHA256: ${SHA256}"
          echo "✅ URL: ${URL}"

          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update sdlc.rb formula
        run: |
          URL="${{ steps.calculate-sha.outputs.url }}"
          SHA256="${{ steps.calculate-sha.outputs.sha256 }}"

          # Update the URL line
          sed -i "s|url \".*\"|url \"${URL}\"|" sdlc.rb

          # Update the SHA256 line
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" sdlc.rb

          echo "Updated sdlc.rb with:"
          echo "  URL: ${URL}"
          echo "  SHA256: ${SHA256}"

      - name: Verify formula syntax
        run: |
          # Simple Ruby syntax check
          ruby -c sdlc.rb

          echo "Formula syntax is valid"

      - name: Create branch and push changes
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch name
          BRANCH_NAME="update-sdlc-${{ steps.calculate-sha.outputs.version }}"

          # Delete branch if it exists locally
          git branch -D "$BRANCH_NAME" 2>/dev/null || true

          # Delete branch if it exists remotely
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          # Create and switch to new branch
          git checkout -b "$BRANCH_NAME"

          # Add and commit changes
          git add sdlc.rb
          git commit -m "Update sdlc formula to ${{ steps.calculate-sha.outputs.version }}"

          # Push the branch (force push to handle any conflicts)
          git push --force origin "$BRANCH_NAME"

          echo "✅ Branch pushed successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        run: |
          BRANCH_NAME="update-sdlc-${{ steps.calculate-sha.outputs.version }}"

          gh pr create \
            --title "Update sdlc formula to ${{ steps.calculate-sha.outputs.version }}" \
            --body "This PR updates the sdlc formula to version \`${{ steps.calculate-sha.outputs.version }}\`.

          ## Changes
          - **Updated URL to:** \`${{ steps.calculate-sha.outputs.url }}\`
          - **Updated SHA256 to:** \`${{ steps.calculate-sha.outputs.sha256 }}\`

          The formula has been validated with Ruby syntax check.

          **Auto-generated by GitHub Actions** 🤖" \
            --head "$BRANCH_NAME" \
            --base main

          echo "✅ Pull request created successfully!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
